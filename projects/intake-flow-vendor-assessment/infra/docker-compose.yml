version: '3.9'

services:
  # --- Core Application ---
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: ifv-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ifvuser:ifvpass@postgres:5432/ifvdb
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LOCAL_MODEL=qwen3:14b
      - CLOAKLLM_ENABLED=true
      - CLOAKLLM_SPACY_MODEL=en_core_web_sm
      - SMTP_HOST=${SMTP_HOST:-smtp.postmarkapp.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-server-api-token}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-notifications@datadnaprivacy.com}
    volumes:
      - ./backend/app:/app/app:ro
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ifv-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Frontend ---
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    container_name: ifv-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - ifv-net

  # --- Database ---
  postgres:
    image: postgres:16-alpine
    container_name: ifv-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=ifvuser
      - POSTGRES_PASSWORD=ifvpass
      - POSTGRES_DB=ifvdb
    volumes:
      - ifv-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifvuser -d ifvdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ifv-net

  # --- Cache / State ---
  redis:
    image: redis:7-alpine
    container_name: ifv-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ifv-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ifv-net

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: ifv-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ifv-net

volumes:
  ifv-postgres-data:
  ifv-redis-data:

networks:
  ifv-net:
    driver: bridge
