version: '3.9'

services:
  # --- Core Application (host networking — avoids Docker port collisions) ---
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: ifv-backend
    restart: unless-stopped
    network_mode: host
    environment:
      - DATABASE_URL=postgresql+asyncpg://ifvuser:ifvpass@127.0.0.1:5433/ifvdb
      - REDIS_URL=redis://127.0.0.1:6380/0
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - LOCAL_MODEL=qwen3:14b
      - CLOAKLLM_ENABLED=true
      - CLOAKLLM_SPACY_MODEL=en_core_web_sm
      - SMTP_HOST=${SMTP_HOST:-smtp.postmarkapp.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-server-api-token}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-notifications@datadnaprivacy.com}
    volumes:
      - ./config:/app/config:ro

  # --- Frontend (host networking) ---
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: ifv-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      - VITE_API_BASE_URL=http://192.168.10.80:8000

  # --- Database ---
  postgres:
    image: postgres:16-alpine
    container_name: ifv-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=ifvuser
      - POSTGRES_PASSWORD=ifvpass
      - POSTGRES_DB=ifvdb
    volumes:
      - ifv-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifvuser -d ifvdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache / State ---
  redis:
    image: redis:7-alpine
    container_name: ifv-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ifv-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ifv-postgres-data:
  ifv-redis-data:
