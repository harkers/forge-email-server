services:
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: homepage-dockerproxy
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      POST: 0
    ports:
      - "127.0.0.1:2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - homepage-net

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: dash.titan.local,192.168.10.80:3000,localhost:3000
      PUID: "1000"
      PGID: "1000"
    volumes:
      - ./config:/app/config
      - ./icons:/app/public/icons:ro
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      - dockerproxy
    networks:
      - homepage-net

networks:
  homepage-net:
    driver: bridge