# Homepage Dashboard - Titan
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled

server {
    listen 80;
    server_name dash.titan.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dash.titan.local;

    ssl_certificate /etc/nginx/ssl/titan/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/titan/privkey.pem;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}