version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: forge-pipeline-api
    restart: unless-stopped
    ports:
      - "4181:4181"
    environment:
      FORGE_PIPELINE_API_KEY: ${FORGE_PIPELINE_API_KEY:-}
    volumes:
      - ./api/storage:/app/storage
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4181/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: forge-pipeline-web
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
