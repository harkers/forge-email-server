version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: forge-pipeline-api
    restart: unless-stopped
    ports:
      - "4181:4181"
    volumes:
      - ./api/storage:/app/storage

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: forge-pipeline-web
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      - api
