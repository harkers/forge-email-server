<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display Forge Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header>
      <p class="eyebrow">DISPLAY FORGE / ADMIN</p>
      <h1>Control Surface</h1>
      <p class="lede">MVP dashboard with scheduling-aware campaign control and playlist preview.</p>
    </header>

    <section class="grid two-up">
      <article class="panel">
        <h2>Create Campaign</h2>
        <form id="campaignForm" class="form">
          <label>Title<input name="title" required placeholder="Spring campaign" /></label>
          <label>Body<textarea name="body" rows="4" placeholder="Short on-screen message"></textarea></label>
          <div class="row">
            <label>Status
              <select name="status">
                <option value="draft">draft</option>
                <option value="active" selected>active</option>
              </select>
            </label>
            <label>Template
              <select name="template">
                <option value="announcement">announcement</option>
                <option value="full-screen-image">full-screen-image</option>
                <option value="rss-card">rss-card</option>
              </select>
            </label>
          </div>
          <div class="row">
            <label>Priority<input type="number" name="priority" value="50" min="0" max="100" /></label>
            <label>Duration (s)<input type="number" name="durationSeconds" value="10" min="3" max="120" /></label>
          </div>
          <div class="row">
            <label>Active from<input type="datetime-local" name="activeFrom" /></label>
            <label>Active until<input type="datetime-local" name="activeUntil" /></label>
          </div>
          <label>Image URL<input name="mediaUrl" placeholder="https://…" /></label>
          <button type="submit">Create campaign</button>
        </form>
      </article>
      <article class="panel">
        <h2>System Summary</h2>
        <div id="summary" class="stats"></div>
        <h3>Service Health</h3>
        <pre id="health">Loading…</pre>
      </article>
    </section>

    <section class="panel">
      <h2>Campaign Library</h2>
      <div id="campaignLibrary" class="playlist"></div>
    </section>

    <section class="panel">
      <h2>Active Playlist</h2>
      <div id="playlist" class="playlist"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
