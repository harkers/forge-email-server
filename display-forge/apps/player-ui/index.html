<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display Forge Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="screen" class="screen loading">
    <div class="overlay">
      <p class="eyebrow">DISPLAY FORGE / PLAYER</p>
      <h1 id="title">Loading playlist…</h1>
      <p id="body">Please stand by.</p>
      <div class="meta">
        <span id="templateBadge" class="badge">template</span>
        <span id="durationBadge" class="badge">duration</span>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
