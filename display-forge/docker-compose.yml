version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: display-forge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forge

  api:
    image: python:3.12-slim
    container_name: display-forge-api
    restart: unless-stopped
    working_dir: /app
    command: bash -lc "python -m http.server 8000"
    environment:
      APP_ENV: ${APP_ENV}
      API_PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      MEDIA_ROOT: ${MEDIA_ROOT}
      CACHE_ROOT: ${CACHE_ROOT}
      LOG_LEVEL: ${LOG_LEVEL}
      PLAYER_HEARTBEAT_SECRET: ${PLAYER_HEARTBEAT_SECRET}
    volumes:
      - ./services/api:/app
      - ./storage/media:${MEDIA_ROOT}
      - ./storage/cache:${CACHE_ROOT}
      - ./storage/logs:/logs
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - forge

  worker:
    image: python:3.12-slim
    container_name: display-forge-worker
    restart: unless-stopped
    working_dir: /app
    command: bash -lc "while true; do echo '[worker] idle placeholder'; sleep 300; done"
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      MEDIA_ROOT: ${MEDIA_ROOT}
      CACHE_ROOT: ${CACHE_ROOT}
      LOG_LEVEL: ${LOG_LEVEL}
      RSS_POLL_INTERVAL_SECONDS: ${RSS_POLL_INTERVAL_SECONDS}
    volumes:
      - ./services/worker:/app
      - ./storage/media:${MEDIA_ROOT}
      - ./storage/cache:${CACHE_ROOT}
      - ./storage/logs:/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - forge

  admin-ui:
    image: nginx:alpine
    container_name: display-forge-admin-ui
    restart: unless-stopped
    volumes:
      - ./apps/admin-ui:/usr/share/nginx/html:ro
    ports:
      - "${ADMIN_UI_PORT}:80"
    depends_on:
      - api
    networks:
      - forge

  player-ui:
    image: nginx:alpine
    container_name: display-forge-player-ui
    restart: unless-stopped
    volumes:
      - ./apps/player-ui:/usr/share/nginx/html:ro
    ports:
      - "${PLAYER_UI_PORT}:80"
    depends_on:
      - api
    networks:
      - forge

networks:
  forge:
    driver: bridge
