<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display Forge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <p class="mini">VISUAL PROJECT DASHBOARD</p>
        <h1>Display Forge</h1>
        <p class="lede">A crisp workspace for projects, tasks, and notes.</p>
      </div>
      <div class="stats">
        <div class="stat"><span id="projectsCount">0</span><small>Projects</small></div>
        <div class="stat"><span id="tasksCount">0</span><small>Tasks</small></div>
      </div>
    </header>
    <section id="grid" class="grid"></section>
  </div>
  <script src="app.js"></script>
</body>
</html>
